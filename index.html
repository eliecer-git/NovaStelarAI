<!DOCTYPE html>
<html lang="es" class="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NovaStelar AI - Advanced</title>

    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Roboto+Mono:wght@400;500&display=swap"
        rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'], mono: ['Roboto Mono', 'monospace'] },
                    colors: {
                        nova: { 900: '#131314', 800: '#1e1f20', 700: '#282a2c', 100: '#e3e3e3' },
                        brand: { 500: '#a8c7fa', 600: '#7cacf8' }
                    }
                }
            }
        }
    </script>

    <link rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,0,0" />
    <link href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/themes/prism-tomorrow.min.css" rel="stylesheet"
        id="prism-theme-dark" />
    <link href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/themes/prism.min.css" rel="stylesheet"
        id="prism-theme-light" disabled />
    <link rel="stylesheet" href="css/style.css">
</head>

<body
    class="bg-gray-50 dark:bg-nova-900 text-gray-900 dark:text-nova-100 font-sans h-screen flex overflow-hidden antialiased transition-colors duration-300">

    <!-- Sidebar -->
    <aside id="sidebar"
        class="w-[280px] bg-white dark:bg-nova-800 h-full flex flex-col shrink-0 border-r border-gray-200 dark:border-white/5 relative z-20 transition-all duration-300">
        <div class="h-16 flex items-center px-4 justify-between">
            <button id="toggle-sidebar"
                class="p-2 rounded-full hover:bg-gray-100 dark:hover:bg-white/10 transition flex items-center justify-center text-gray-500 dark:text-gray-300">
                <span class="material-symbols-rounded text-2xl">menu_open</span>
            </button>
            <div class="sm:hidden text-lg font-medium dark:text-white">NovaStelar</div>
        </div>
        <div class="px-4 mb-4 mt-2">
            <button id="btn-new-chat"
                class="flex items-center gap-3 bg-gray-100 dark:bg-nova-700 hover:bg-gray-200 dark:hover:bg-nova-700/80 transition rounded-full px-4 py-2.5 w-full md:w-[140px] text-sm font-medium dark:text-white">
                <span class="material-symbols-rounded text-xl">add</span> Nuevo chat
            </button>
        </div>
        <div class="flex-1 overflow-y-auto px-4 custom-scrollbar" id="chat-history-container">
            <p
                class="text-[11px] font-semibold text-gray-500 dark:text-gray-400 mb-2 mt-2 px-2 uppercase tracking-wider">
                Reciente</p>
            <ul id="history-list" class="space-y-1"></ul>
        </div>
        <div class="p-4 border-t border-gray-200 dark:border-white/5 space-y-1">
            <button id="theme-toggle"
                class="flex items-center gap-3 px-4 py-2.5 rounded-full hover:bg-gray-100 dark:hover:bg-white/10 transition text-sm w-full text-left dark:text-gray-300">
                <span class="material-symbols-rounded text-xl" id="theme-icon">dark_mode</span> Cambiar Tema
            </button>
            <button id="btn-settings"
                class="flex items-center gap-3 px-4 py-2.5 rounded-full hover:bg-gray-100 dark:hover:bg-white/10 transition text-sm w-full text-left dark:text-gray-300">
                <span class="material-symbols-rounded text-xl">settings</span> Ajustes
            </button>
        </div>
    </aside>

    <!-- Main Workspace -->
    <main
        class="flex-1 flex flex-col h-full bg-gray-50 dark:bg-nova-900 relative transition-colors duration-300 w-full">
        <!-- Topbar -->
        <header
            class="h-16 flex items-center justify-between px-4 sm:px-6 shrink-0 relative z-10 w-full border-b border-transparent dark:border-transparent">
            <div class="flex items-center gap-3">
                <button id="header-toggle-sidebar"
                    class="hidden p-2 rounded-full hover:bg-gray-200 dark:hover:bg-white/10 transition flex items-center justify-center text-gray-600 dark:text-gray-300">
                    <span class="material-symbols-rounded text-2xl">menu</span>
                </button>
                <div
                    class="text-[1.2rem] font-medium tracking-tight dark:text-white text-gray-800 flex items-center gap-2">
                    NovaStelar <span
                        class="text-[10px] bg-brand-500/10 text-brand-500 px-2 py-0.5 rounded-full font-semibold border border-brand-500/20">Advanced</span>
                </div>
            </div>
            <div
                class="w-9 h-9 rounded-full bg-gradient-to-tr from-purple-500 to-indigo-500 flex items-center justify-center text-white text-sm font-medium shadow-sm">
                E
            </div>
        </header>

        <!-- Chat Area -->
        <div class="flex-1 overflow-y-auto flex flex-col items-center custom-scrollbar pb-[180px]" id="chat-stream">
            <!-- Zero State / Pantalla de Bienvenida -->
            <div id="zero-state" class="w-full max-w-[850px] flex flex-col items-center mt-[8vh] px-4">
                <div
                    class="w-14 h-14 rounded-2xl bg-white dark:bg-nova-800 flex items-center justify-center shadow-[0_0_30px_rgba(168,199,250,0.2)] dark:shadow-[0_0_30px_rgba(168,199,250,0.1)] mb-6 border border-gray-200 dark:border-white/5 ai-glow-pulse">
                    <span class="material-symbols-rounded text-3xl text-brand-500">auto_awesome</span>
                </div>
                <h1
                    class="text-4xl sm:text-[44px] font-medium text-transparent bg-clip-text bg-gradient-to-r from-blue-600 via-purple-500 to-brand-500 dark:from-brand-500 dark:via-purple-400 dark:to-brand-500 bg-[length:200%_auto] animate-gradient mb-10 text-center tracking-tight">
                    Hola, Eliecer
                </h1>

                <!-- 4 Sugerencias Gemini Style -->
                <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-3 w-full">
                    <button class="suggestion-card group"
                        onclick="window.submitPrompt('Escribe un script en Python para analizar datos masivos usando DataFrames.')">
                        <span
                            class="material-symbols-rounded text-blue-500 dark:text-blue-400 mb-2 block group-hover:scale-110 transition-transform">code</span>
                        <p class="text-[13px] text-gray-600 dark:text-gray-300 text-left">Escribe un script en Python
                            para analizar datos</p>
                    </button>
                    <button class="suggestion-card group"
                        onclick="window.submitPrompt('Explícame la física cuántica de forma sencilla.')">
                        <span
                            class="material-symbols-rounded text-purple-500 dark:text-purple-400 mb-2 block group-hover:scale-110 transition-transform">school</span>
                        <p class="text-[13px] text-gray-600 dark:text-gray-300 text-left">Explícame la física cuántica
                            de forma sencilla</p>
                    </button>
                    <button class="suggestion-card group"
                        onclick="window.submitPrompt('Genera una imagen artística de una nebulosa hiperrealista a 4K.')">
                        <span
                            class="material-symbols-rounded text-pink-500 dark:text-pink-400 mb-2 block group-hover:scale-110 transition-transform">palette</span>
                        <p class="text-[13px] text-gray-600 dark:text-gray-300 text-left">Genera una imagen artística de
                            una nebulosa</p>
                    </button>
                    <button class="suggestion-card group"
                        onclick="window.submitPrompt('Crea una pista de música lofi relajante.')">
                        <span
                            class="material-symbols-rounded text-green-500 dark:text-green-400 mb-2 block group-hover:scale-110 transition-transform">music_note</span>
                        <p class="text-[13px] text-gray-600 dark:text-gray-300 text-left">Crea una pista de música lofi
                            relajante para trabajar</p>
                    </button>
                </div>
            </div>

            <!-- Thread de Conversación -->
            <div id="conversation-thread" class="w-full max-w-[850px] flex flex-col gap-6 px-4 py-6 hidden"></div>

            <!-- Loader / Thinking State -->
            <div id="loading-indicator" class="w-full max-w-[850px] px-4 hidden mb-4">
                <div class="flex gap-4">
                    <div class="w-8 h-8 rounded-full flex items-center justify-center shrink-0">
                        <span class="material-symbols-rounded text-[22px] text-brand-500 ai-spin">auto_awesome</span>
                    </div>
                </div>
            </div>
        </div>

        <!-- Input Area Bottom Dock -->
        <div
            class="absolute bottom-0 w-full flex justify-center pb-6 px-4 pointer-events-none bg-gradient-to-t from-gray-50 via-gray-50 dark:from-nova-900 dark:via-nova-900 to-transparent pt-20 transition-colors duration-300">
            <div class="w-full max-w-[850px] pointer-events-auto shrink-0 relative flex flex-col items-center">

                <!-- Wrapper del Input (Cápsula Blanca/Oscura) -->
                <div
                    class="w-full bg-white dark:bg-nova-800 border border-gray-300 dark:border-white/10 rounded-[32px] shadow-xl focus-within:shadow-2xl dark:focus-within:bg-[#202224] transition-all relative flex flex-col px-3 py-2 min-h-[60px]">

                    <!-- Feature Badge (Muestra lo seleccionado del menu +) -->
                    <div id="feature-badge-container" class="hidden px-2 pt-2 pb-1">
                        <div
                            class="inline-flex items-center gap-1.5 bg-brand-500/10 text-brand-600 dark:text-brand-500 px-3 py-1 rounded-full text-xs font-semibold">
                            <span id="feature-badge-icon" class="material-symbols-rounded text-[14px]">palette</span>
                            <span id="feature-badge-text">Modo Imagen</span>
                            <button id="feature-badge-close"
                                class="ml-1 hover:text-black dark:hover:text-white rounded-full flex items-center"><span
                                    class="material-symbols-rounded text-[14px]">close</span></button>
                        </div>
                    </div>

                    <div class="flex items-end w-full">
                        <div class="relative mb-1">
                            <button id="plus-btn"
                                class="w-10 h-10 shrink-0 rounded-full text-gray-500 dark:text-gray-400 hover:text-gray-800 dark:hover:text-white hover:bg-gray-100 dark:hover:bg-white/10 transition flex items-center justify-center">
                                <span class="material-symbols-rounded text-[24px]">add_circle</span>
                            </button>

                            <!-- Popper Menu Flotante del Botón (+) -->
                            <div id="plus-menu"
                                class="absolute bottom-[50px] left-0 bg-white dark:bg-nova-700 w-52 rounded-2xl shadow-xl shadow-black/10 dark:shadow-black/40 border border-gray-100 dark:border-white/10 flex flex-col p-2 transform scale-95 opacity-0 pointer-events-none transition-all origin-bottom-left z-50">
                                <button
                                    class="menu-item flex items-center gap-3 px-3 py-2.5 rounded-xl text-left text-sm hover:bg-gray-100 dark:hover:bg-white/5 dark:text-gray-200"
                                    onclick="window.selectFeature('imagen', 'palette')">
                                    <span class="material-symbols-rounded text-pink-500 text-[20px]">palette</span>
                                    Crear Imagen
                                </button>
                                <button
                                    class="menu-item flex items-center gap-3 px-3 py-2.5 rounded-xl text-left text-sm hover:bg-gray-100 dark:hover:bg-white/5 dark:text-gray-200"
                                    onclick="window.selectFeature('video', 'movie')">
                                    <span class="material-symbols-rounded text-purple-500 text-[20px]">movie</span>
                                    Crear Video
                                </button>
                                <button
                                    class="menu-item flex items-center gap-3 px-3 py-2.5 rounded-xl text-left text-sm hover:bg-gray-100 dark:hover:bg-white/5 dark:text-gray-200"
                                    onclick="window.selectFeature('musica', 'music_note')">
                                    <span class="material-symbols-rounded text-green-500 text-[20px]">music_note</span>
                                    Crear Música
                                </button>
                                <button
                                    class="menu-item flex items-center gap-3 px-3 py-2.5 rounded-xl text-left text-sm hover:bg-gray-100 dark:hover:bg-white/5 dark:text-gray-200"
                                    onclick="window.selectFeature('aprendizaje', 'school')">
                                    <span class="material-symbols-rounded text-blue-500 text-[20px]">school</span>
                                    Aprendizaje
                                </button>
                            </div>
                        </div>

                        <textarea id="user-input" rows="1"
                            class="flex-1 bg-transparent text-gray-900 dark:text-[#e3e3e3] placeholder-gray-500 focus:outline-none resize-none px-3 py-3 max-h-[200px] text-[15.5px] custom-scrollbar"
                            placeholder="Ingresa una instrucción para NovaStelar"></textarea>

                        <button id="send-btn" disabled
                            class="w-10 h-10 shrink-0 rounded-full bg-transparent text-gray-400 dark:text-gray-500 flex items-center justify-center transition disabled:opacity-50 disabled:cursor-not-allowed enabled:bg-black enabled:text-white dark:enabled:text-black dark:enabled:bg-brand-500 dark:enabled:hover:bg-brand-600 mb-1">
                            <span class="material-symbols-rounded text-[22px] font-medium">arrow_upward</span>
                        </button>
                    </div>
                </div>

                <p class="text-[11px] text-gray-500 mt-3 text-center tracking-wide">NovaStelar genera respuestas por
                    Inteligencia Artificial Avanzada. Valida siempre todo.</p>
            </div>
        </div>
    </main>

    <!-- UI Toast Professional System -->
    <div id="toast-container" class="fixed top-6 right-6 z-50 flex flex-col gap-3 pointer-events-none"></div>

    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/prism.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-python.min.js"></script>
    <script src="js/ui_controller.js"></script>
</body>

</html>
